name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

# Force GitHub Actions to use Node 24 runtime to resolve deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Install pnpm (It will respect the packageManager field in package.json)
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 2. Setup Node.js (Using modern Node 24 version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # 3. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. Build Packages (sequential to ensure type declarations are available)
      - name: Build core package
        run: cd packages/core && pnpm build

      - name: Build adapter packages
        run: |
          for pkg in packages/memory-inmemory; do
            [ -d "$pkg" ] && cd "$pkg" && pnpm build && cd ../..
          done
      # 5. Quality Control and Tests
      # Using scripts defined in your root package.json
      - name: Lint
        run: pnpm lint:all

      - name: Typecheck
        run: pnpm typecheck:all

      - name: Test
        run: pnpm test

      - name: Test coverage
        run: pnpm test:coverage

      # 6. Documentation generation
      - name: TypeDoc
        run: pnpm run docs
